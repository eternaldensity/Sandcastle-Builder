name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          # Exclude build/dev files
          exclude: |
            node_modules
            src
            dist
            docs
            .claude
            .github
            .gitignore
            package.json
            package-lock.json
            tsconfig.json

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
